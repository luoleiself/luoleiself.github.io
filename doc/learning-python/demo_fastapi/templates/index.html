<html>
<head>
    <title>Item Details</title>
    <link href="{{ url_for('static', path='/styles.css') }}" rel="stylesheet">
</head>
<body>
    <h1><a href="{{ url_for('get_template', id=id) }}">Item ID: {{ id }}</a></h1>
    <h2>过滤器: uppercase: {{ 'name'|upper }}</h2>
    <p>自定义过滤器: {{ 'hello world'|marked }}</p>
    <hr/>
    <p>context_processor: {{ context_processors_name }}</p>
    <p>context_processor: {{ url }}<br/> {{ method }}<br/> {{ cookie }}<br/> {{ user_agent }}</p>
</body>
</html>
